[build]
  command   = ""
  publish   = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[dev]
  port      = 8891
  publish   = "public"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"

[[redirects]]
  from   = "/"
  to     = "/pedidos.html"
  status = 200
